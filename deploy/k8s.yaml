apiVersion: v1
kind: Namespace
metadata:
  name: locigram-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locigram-web
  namespace: locigram-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locigram-web
  template:
    metadata:
      labels:
        app: locigram-web
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: locigram-web
          image: ghcr.io/locigram/locigram-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: locigram-web
  namespace: locigram-web
spec:
  type: NodePort
  selector:
    app: locigram-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30320
